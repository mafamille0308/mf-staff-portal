<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MF Staff Portal</title>
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="./assets/styles.css" />
  <!-- GIS -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <header class="app-header">
    <div id="appTitle" class="app-title">MF Staff Portal</div>

    <div class="app-header-right">
      <div id="userBadge" class="user-badge is-hidden"></div>
      <button id="btnRefresh" class="btn btn-icon-action" type="button" title="更新" aria-label="更新">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 2v6h-6"></path>
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
          <path d="M3 22v-6h6"></path>
          <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
        </svg>
      </button>
    </div>
  </header>

  <main id="app" class="app-main"></main>

  <nav class="bottom-nav">
    <a class="nav-item" href="#/visits" data-route="visits">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M8 2v4"></path>
        <path d="M16 2v4"></path>
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
        <path d="M3 10h18"></path>
        <path d="m9 16 2 2 4-4"></path>
      </svg>
      <span class="nav-label">予約</span>
    </a>
    <a class="nav-item" href="#/customers" data-route="customers">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 21a8 8 0 0 0-16 0"></path>
        <circle cx="10" cy="8" r="5"></circle>
        <path d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3"></path>
      </svg>
      <span class="nav-label">顧客</span>
    </a>
    <a class="nav-item" href="#/invoices" data-route="invoices">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"></path>
        <path d="m12 10 3-3"></path>
        <path d="m9 7 3 3v7.5"></path>
        <path d="M9 11h6"></path>
        <path d="M9 15h6"></path>
      </svg>
      <span class="nav-label">請求</span>
    </a>
    <a class="nav-item" href="#/summary" data-route="summary">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 3v16a2 2 0 0 0 2 2h16"></path>
        <path d="M18 17V9"></path>
        <path d="M13 17V5"></path>
        <path d="M8 17v-3"></path>
      </svg>
      <span class="nav-label">稼働</span>
    </a>
    <a class="nav-item" href="#/settings" data-route="settings">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      <span class="nav-label">設定</span>
    </a>
  </nav>

  <!-- Toast -->
  <div id="toastHost" class="toast-host"></div>

  <!-- Modal -->
  <div id="modalHost" class="modal-host is-hidden" aria-hidden="true"></div>

  <script type="module">
    import { CONFIG, initRuntimeConfig_ } from "./js/config.js";
    await initRuntimeConfig_();
    const appName = String(CONFIG.APP_NAME || "").trim() || "MF Staff Portal";
    document.title = appName;
    const appTitleEl = document.getElementById("appTitle");
    if (appTitleEl) appTitleEl.textContent = appName;
    const { initApp } = await import("./js/router.js");
    initApp();
  </script>
</body>
</html>
